<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | NotesApp</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc; /* Level 0 Background from Style Guidance */
      }
      .tonal-layer-1 {
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
      }
      .focus-ring:focus-within {
        border-bottom: 2px solid #334155;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(8px);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              secondary: "#006c49",
              "tertiary-fixed": "#fcdeb3",
              "inverse-surface": "#303032",
              "primary-fixed-dim": "#b9c7e0",
              "primary-fixed": "#d5e3fd",
              "surface-container-low": "#f5f3f5",
              outline: "#75777d",
              "on-secondary-container": "#00714d",
              "surface-container-lowest": "#ffffff",
              error: "#ba1a1a",
              "surface-variant": "#e4e2e4",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "surface-tint": "#515f74",
              "surface-container-highest": "#e4e2e4",
              tertiary: "#38270a",
              "on-secondary-fixed-variant": "#005236",
              "on-surface-variant": "#44474c",
              "on-secondary": "#ffffff",
              "on-primary-fixed": "#0d1c2f",
              "on-tertiary-container": "#c3a881",
              "surface-container-high": "#eae7e9",
              "inverse-primary": "#b9c7e0",
              "on-primary-container": "#9eadc5",
              "inverse-on-surface": "#f2f0f2",
              "on-error-container": "#93000a",
              "error-container": "#ffdad6",
              "surface-dim": "#dbd9db",
              "on-background": "#1b1b1d",
              "secondary-fixed-dim": "#4edea3",
              "on-surface": "#1b1b1d",
              "tertiary-container": "#503d1e",
              primary: "#1d2b3e",
              "on-tertiary-fixed": "#281901",
              surface: "#fbf9fa",
              "on-primary-fixed-variant": "#3a485c",
              "primary-container": "#334155",
              "tertiary-fixed-dim": "#dfc299",
              "secondary-container": "#6cf8bb",
              "outline-variant": "#c5c6cd",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#6ffbbe",
              "on-tertiary-fixed-variant": "#574424",
              "on-secondary-fixed": "#002113",
              background: "#fbf9fa",
              "surface-container": "#efedef",
              "surface-bright": "#fbf9fa",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "margin-mobile": "16px",
              "sidebar-width": "280px",
              gutter: "24px",
              "margin-desktop": "40px",
              "max-content-width": "800px",
              unit: "4px",
            },
            fontFamily: {
              "body-lg": ["Inter"],
              "label-sm": ["Inter"],
              "label-md": ["Inter"],
              "body-md": ["Inter"],
              "headline-lg": ["Inter"],
              "headline-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
            },
            fontSize: {
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "1", fontWeight: "600" }],
              "label-md": [
                "14px",
                { lineHeight: "1", letterSpacing: "0.01em", fontWeight: "500" },
              ],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "1.2", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-mobile"
  >
    <!-- Subtle Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
      <div
        class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-fixed/20 blur-[100px] rounded-full"
      ></div>
      <div
        class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-secondary-fixed/20 blur-[80px] rounded-full"
      ></div>
    </div>
    <!-- Login Container -->
    <main class="w-full max-w-[440px] animate-fade-in">
      <!-- Brand Header (Simplified TopAppBar context) -->
      <div class="flex flex-col items-center mb-10 space-y-2 text-center">
        <h1
          class="font-headline-lg text-headline-lg text-primary tracking-tight"
        >
          NotesApp
        </h1>
        <p class="font-body-md text-body-md text-on-surface-variant">
          Focus on what matters most.
        </p>
      </div>
      <!-- Login Card -->
      <div
        class="tonal-layer-1 rounded-xl shadow-sm p-8 md:p-10 border border-outline-variant"
      >
        <header class="mb-8">
          <h2 class="font-headline-md text-headline-md text-on-surface">
            Welcome back
          </h2>
          <p class="font-label-md text-label-md text-on-surface-variant mt-1">
            Please enter your details to sign in.
          </p>
        </header>
        <form action="#" class="space-y-6" method="POST">
          <!-- Email Field -->
          <div class="space-y-1.5">
            <label
              class="font-label-md text-label-md text-on-surface"
              for="email"
              >Email Address</label
            >
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors"
                >mail</span
              >
              <input
                class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-0 transition-all placeholder:text-outline-variant"
                id="email"
                name="email"
                placeholder="name@example.com"
                required=""
                type="email"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center">
              <label
                class="font-label-md text-label-md text-on-surface"
                for="password"
                >Password</label
              >
              <a
                class="font-label-sm text-label-sm text-primary hover:underline transition-all"
                href="#"
                >Forgot password?</a
              >
            </div>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors"
                >lock</span
              >
              <input
                class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-0 transition-all placeholder:text-outline-variant"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
              <button
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined text-[20px]"
                  >visibility</span
                >
              </button>
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center space-x-2">
            <input
              class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary"
              id="remember"
              name="remember"
              type="checkbox"
            />
            <label
              class="font-label-md text-label-md text-on-surface-variant cursor-pointer"
              for="remember"
              >Remember for 30 days</label
            >
          </div>
          <!-- Login CTA -->
          <button
            class="w-full py-3.5 bg-primary-container text-on-primary font-headline-md text-headline-md rounded-lg shadow-sm hover:bg-primary transition-all active:scale-[0.98] flex items-center justify-center space-x-2"
            type="submit"
          >
            <span>Login</span>
          </button>
          <!-- Social Login Divider -->
          <div class="relative flex items-center py-4">
            <div class="flex-grow border-t border-outline-variant"></div>
            <span
              class="flex-shrink mx-4 text-outline font-label-sm text-label-sm"
              >Or continue with</span
            >
            <div class="flex-grow border-t border-outline-variant"></div>
          </div>
          <!-- Social Buttons -->
          <div class="grid grid-cols-2 gap-4">
            <button
              class="flex items-center justify-center space-x-2 py-2.5 px-4 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors font-label-md text-label-md"
              type="button"
            >
              <img
                class="w-5 h-5"
                data-alt="Minimalist logo of a major technology company featuring a colorful four-pane window design on a clean white background. The aesthetic is modern, high-tech, and professional, maintaining a soft light-mode appearance with subtle corporate branding."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4JRZ66hjXVrpt2Q6f90k--jdYUtnfNpeb7cRqva4ObNSoCDs0mJdB5g3zovxlshWtst6G50IENOWer0HXcfqqwDmCTPp2qIa6X9h7VrPFjpSaPZuPXKuX-Ra7AYxzDePlJSWmhgjiayuNtkvEFjnsOv4AoocdI5CHonQGmrVsSjnSPvXGYyt-gQxOpL6qPmP_GIVY7yz4Rk5hb6irixBRXaqy0cV4h8IXLEyZl2D4Am-6jZeHjUSa60MmTZEcteGjOUXuHEdEl2CZ"
              />
              <span>Google</span>
            </button>
            <button
              class="flex items-center justify-center space-x-2 py-2.5 px-4 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors font-label-md text-label-md"
              type="button"
            >
              <img
                class="w-5 h-5"
                data-alt="A sleek, minimalist vector illustration of a stylized fruit icon with a bite taken out of it, rendered in a soft matte grey. The background is a clean, neutral white, reflecting a high-end, modern technological brand identity that emphasizes simplicity and premium design."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBphTV2VZxWEPlSwt1xm9BmNWupb9d-VvjazQRkLQIbs3gVc4F0iVn2iYqrMZSlZ6wLTPx4Bs9KhYCM5jv2fbq4_aRrkEPEUskQbGuXwMSO9HBukyzFYCdmtO8DwJnrFbjU2CiMrYAdw9ohUxOAQVKS2XB7Rk-z5z3BxlTlhRlTban8qNjckx6jkq7Du118-msg53Uk5_zq6TNJDAHHYk-KV4QB4zMFRHWM-lc37DsnxS4Ck-Lvl0tvchfQAW3_XEYb6AJNm5r2f7We"
              />
              <span>Apple</span>
            </button>
          </div>
        </form>
        <footer class="mt-8 text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            Don't have an account?
            <a
              class="text-primary font-bold hover:underline"
              href="./register.html"
              >Register</a
            >
          </p>
        </footer>
      </div>
      <!-- Footer Links -->
      <div class="mt-8 flex justify-center space-x-6">
        <a
          class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors"
          href="#"
          >Privacy Policy</a
        >
        <a
          class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors"
          href="#"
          >Terms of Service</a
        >
        <a
          class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors"
          href="#"
          >Help Center</a
        >
      </div>
    </main>
    <script>
      // Simple micro-interaction for password toggle
      document
        .querySelector('button[type="button"] span')
        .addEventListener("click", function () {
          const input = this.closest(".relative").querySelector("input");
          if (input.type === "password") {
            input.type = "text";
            this.textContent = "visibility_off";
          } else {
            input.type = "password";
            this.textContent = "visibility";
          }
        });

      // Form submit animation (visual only)
      document.querySelector("form").addEventListener("submit", function (e) {
        const btn = this.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML =
          '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
        // Mimic redirect/processing
        setTimeout(() => {
          btn.innerHTML = "<span>Success</span>";
        }, 1000);
      });
    </script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
  </body>
</html>
