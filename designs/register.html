<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register | NotesApp</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              secondary: "#006c49",
              "tertiary-fixed": "#fcdeb3",
              "inverse-surface": "#303032",
              "primary-fixed-dim": "#b9c7e0",
              "primary-fixed": "#d5e3fd",
              "surface-container-low": "#f5f3f5",
              outline: "#75777d",
              "on-secondary-container": "#00714d",
              "surface-container-lowest": "#ffffff",
              error: "#ba1a1a",
              "surface-variant": "#e4e2e4",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "surface-tint": "#515f74",
              "surface-container-highest": "#e4e2e4",
              tertiary: "#38270a",
              "on-secondary-fixed-variant": "#005236",
              "on-surface-variant": "#44474c",
              "on-secondary": "#ffffff",
              "on-primary-fixed": "#0d1c2f",
              "on-tertiary-container": "#c3a881",
              "surface-container-high": "#eae7e9",
              "inverse-primary": "#b9c7e0",
              "on-primary-container": "#9eadc5",
              "inverse-on-surface": "#f2f0f2",
              "on-error-container": "#93000a",
              "error-container": "#ffdad6",
              "surface-dim": "#dbd9db",
              "on-background": "#1b1b1d",
              "secondary-fixed-dim": "#4edea3",
              "on-surface": "#1b1b1d",
              "tertiary-container": "#503d1e",
              primary: "#1d2b3e",
              "on-tertiary-fixed": "#281901",
              surface: "#fbf9fa",
              "on-primary-fixed-variant": "#3a485c",
              "primary-container": "#334155",
              "tertiary-fixed-dim": "#dfc299",
              "secondary-container": "#6cf8bb",
              "outline-variant": "#c5c6cd",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#6ffbbe",
              "on-tertiary-fixed-variant": "#574424",
              "on-secondary-fixed": "#002113",
              background: "#fbf9fa",
              "surface-container": "#efedef",
              "surface-bright": "#fbf9fa",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "margin-mobile": "16px",
              "sidebar-width": "280px",
              gutter: "24px",
              "margin-desktop": "40px",
              "max-content-width": "800px",
              unit: "4px",
            },
            fontFamily: {
              "body-lg": ["Inter"],
              "label-sm": ["Inter"],
              "label-md": ["Inter"],
              "body-md": ["Inter"],
              "headline-lg": ["Inter"],
              "headline-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
            },
            fontSize: {
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "1", fontWeight: "600" }],
              "label-md": [
                "14px",
                { lineHeight: "1", letterSpacing: "0.01em", fontWeight: "500" },
              ],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "1.2", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #f8fafc; /* Style Guidance Level 0 */
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .input-focus-effect:focus {
        outline: none;
        border-bottom: 2px solid #1d2b3e; /* Primary color indicator */
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop"
  >
    <!-- Subtle Background Atmosphere -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div
        class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-fixed opacity-20 blur-[120px]"
      ></div>
      <div
        class="absolute top-[60%] -right-[5%] w-[30%] h-[30%] rounded-full bg-secondary-container opacity-20 blur-[100px]"
      ></div>
    </div>
    <!-- Registration Card -->
    <main class="relative z-10 w-full max-w-[480px]">
      <div
        class="bg-surface-container-lowest border border-outline-variant shadow-[0px_4px_12px_rgba(0,0,0,0.05)] rounded-xl p-8 md:p-10 transition-all duration-300"
      >
        <!-- Brand Header -->
        <header class="text-center mb-10">
          <h1 class="font-headline-lg text-headline-lg text-on-background mb-2">
            Create Account
          </h1>
          <p class="font-body-md text-body-md text-on-surface-variant">
            Join NotesApp to start organizing your thoughts today.
          </p>
        </header>
        <!-- Registration Form -->
        <form action="#" class="space-y-6" onsubmit="event.preventDefault()">
          <!-- Full Name Field -->
          <div class="flex flex-col space-y-2">
            <label
              class="font-label-md text-label-md text-on-surface flex items-center gap-2"
              for="name"
            >
              <span
                class="material-symbols-outlined text-[18px]"
                data-icon="person"
                >person</span
              >
              Full Name
            </label>
            <input
              class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface input-focus-effect transition-all duration-200 placeholder:text-outline/50"
              id="name"
              placeholder="John Doe"
              type="text"
            />
          </div>
          <!-- Email Field -->
          <div class="flex flex-col space-y-2">
            <label
              class="font-label-md text-label-md text-on-surface flex items-center gap-2"
              for="email"
            >
              <span
                class="material-symbols-outlined text-[18px]"
                data-icon="mail"
                >mail</span
              >
              Email Address
            </label>
            <input
              class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface input-focus-effect transition-all duration-200 placeholder:text-outline/50"
              id="email"
              placeholder="name@example.com"
              type="email"
            />
          </div>
          <!-- Password Fields Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Password -->
            <div class="flex flex-col space-y-2">
              <label
                class="font-label-md text-label-md text-on-surface flex items-center gap-2"
                for="password"
              >
                <span
                  class="material-symbols-outlined text-[18px]"
                  data-icon="lock"
                  >lock</span
                >
                Password
              </label>
              <input
                class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface input-focus-effect transition-all duration-200 placeholder:text-outline/50"
                id="password"
                placeholder="••••••••"
                type="password"
              />
            </div>
            <!-- Confirm Password -->
            <div class="flex flex-col space-y-2">
              <label
                class="font-label-md text-label-md text-on-surface flex items-center gap-2"
                for="retype-password"
              >
                <span
                  class="material-symbols-outlined text-[18px]"
                  data-icon="verified_user"
                  >verified_user</span
                >
                Confirm
              </label>
              <input
                class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface input-focus-effect transition-all duration-200 placeholder:text-outline/50"
                id="retype-password"
                placeholder="••••••••"
                type="password"
              />
            </div>
          </div>
          <!-- CTA Section -->
          <div class="pt-4 flex flex-col space-y-4">
            <button
              class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-headline-md text-headline-md hover:bg-primary transition-all duration-300 active:scale-[0.98] shadow-sm"
              type="submit"
            >
              Register
            </button>
            <p
              class="text-center font-body-md text-body-md text-on-surface-variant"
            >
              Already have an account?
              <a
                class="text-primary font-bold hover:underline"
                href="./login.html"
                >Login</a
              >
            </p>
          </div>
        </form>
        <!-- Security Footer -->
        <footer
          class="mt-10 pt-6 border-t border-outline-variant flex items-center justify-center space-x-4 opacity-60"
        >
          <div class="flex items-center gap-1.5 font-label-sm text-label-sm">
            <span
              class="material-symbols-outlined text-[16px]"
              data-icon="security"
              >security</span
            >
            Secure Encryption
          </div>
          <div class="w-1 h-1 bg-outline rounded-full"></div>
          <div class="flex items-center gap-1.5 font-label-sm text-label-sm">
            <span
              class="material-symbols-outlined text-[16px]"
              data-icon="privacy_tip"
              >privacy_tip</span
            >
            Privacy Focused
          </div>
        </footer>
      </div>
      <!-- Secondary Visual Anchor (Creative Grid/Bento hint) -->
      <div class="mt-8 grid grid-cols-3 gap-4 px-4 opacity-40">
        <div class="h-1 bg-outline-variant rounded-full"></div>
        <div class="h-1 bg-primary rounded-full"></div>
        <div class="h-1 bg-outline-variant rounded-full"></div>
      </div>
    </main>
    <script>
      // Micro-interactions for form inputs
      const inputs = document.querySelectorAll("input");
      inputs.forEach((input) => {
        input.addEventListener("focus", () => {
          input.parentElement
            .querySelector("label")
            .classList.add("text-primary");
          input.parentElement.querySelector(
            "span.material-symbols-outlined",
          ).style.fontVariationSettings = "'FILL' 1";
        });
        input.addEventListener("blur", () => {
          input.parentElement
            .querySelector("label")
            .classList.remove("text-primary");
          input.parentElement.querySelector(
            "span.material-symbols-outlined",
          ).style.fontVariationSettings = "'FILL' 0";
        });
      });
    </script>
  </body>
</html>
