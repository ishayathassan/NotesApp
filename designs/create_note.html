<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NotesApp - Create/Edit Note</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        color: #1b1b1d;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: middle;
      }
      .note-editor-container {
        max-width: 800px;
        margin: 0 auto;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              secondary: "#006c49",
              "tertiary-fixed": "#fcdeb3",
              "inverse-surface": "#303032",
              "primary-fixed-dim": "#b9c7e0",
              "primary-fixed": "#d5e3fd",
              "surface-container-low": "#f5f3f5",
              outline: "#75777d",
              "on-secondary-container": "#00714d",
              "surface-container-lowest": "#ffffff",
              error: "#ba1a1a",
              "surface-variant": "#e4e2e4",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "surface-tint": "#515f74",
              "surface-container-highest": "#e4e2e4",
              tertiary: "#38270a",
              "on-secondary-fixed-variant": "#005236",
              "on-surface-variant": "#44474c",
              "on-secondary": "#ffffff",
              "on-primary-fixed": "#0d1c2f",
              "on-tertiary-container": "#c3a881",
              "surface-container-high": "#eae7e9",
              "inverse-primary": "#b9c7e0",
              "on-primary-container": "#9eadc5",
              "inverse-on-surface": "#f2f0f2",
              "on-error-container": "#93000a",
              "error-container": "#ffdad6",
              "surface-dim": "#dbd9db",
              "on-background": "#1b1b1d",
              "secondary-fixed-dim": "#4edea3",
              "on-surface": "#1b1b1d",
              "tertiary-container": "#503d1e",
              primary: "#1d2b3e",
              "on-tertiary-fixed": "#281901",
              surface: "#fbf9fa",
              "on-primary-fixed-variant": "#3a485c",
              "primary-container": "#334155",
              "tertiary-fixed-dim": "#dfc299",
              "secondary-container": "#6cf8bb",
              "outline-variant": "#c5c6cd",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#6ffbbe",
              "on-tertiary-fixed-variant": "#574424",
              "on-secondary-fixed": "#002113",
              background: "#fbf9fa",
              "surface-container": "#efedef",
              "surface-bright": "#fbf9fa",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "margin-mobile": "16px",
              "sidebar-width": "280px",
              gutter: "24px",
              "margin-desktop": "40px",
              "max-content-width": "800px",
              unit: "4px",
            },
            fontFamily: {
              "body-lg": ["Inter"],
              "label-sm": ["Inter"],
              "label-md": ["Inter"],
              "body-md": ["Inter"],
              "headline-lg": ["Inter"],
              "headline-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
            },
            fontSize: {
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "1", fontWeight: "600" }],
              "label-md": [
                "14px",
                { lineHeight: "1", letterSpacing: "0.01em", fontWeight: "500" },
              ],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "1.2", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background text-on-surface selection:bg-primary-fixed-dim selection:text-primary"
  >
    <div class="flex h-screen overflow-hidden">
      <!-- SideNavBar (Predicted Component) -->
      <aside
        class="fixed left-0 top-0 h-full w-[280px] bg-surface border-r border-outline-variant flex flex-col h-full py-gutter px-4 z-20"
      >
        <!-- Brand Identity -->
        <div class="mb-10 px-2">
          <h1 class="font-headline-md text-headline-md text-primary font-bold">
            NotesApp
          </h1>
          <p class="text-on-surface-variant font-label-md text-label-md">
            Personal Workspace
          </p>
        </div>
        <!-- Navigation Links -->
        <nav class="flex-grow space-y-1">
          <!-- Home (Active) -->
          <a
            class="flex items-center gap-3 px-3 py-2.5 rounded bg-surface-container-high font-bold text-on-surface transition-colors duration-200 cursor-pointer"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="home">home</span>
            <span class="font-body-md text-body-md">Home</span>
          </a>
          <!-- Past Dates (Inactive) -->
          <a
            class="flex items-center gap-3 px-3 py-2.5 rounded text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 cursor-pointer"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="history"
              >history</span
            >
            <span class="font-body-md text-body-md">Past Dates</span>
          </a>
        </nav>
        <!-- Profile / Footer -->
        <div class="mt-auto pt-6 border-t border-outline-variant">
          <nav class="space-y-1">
            <a
              class="flex items-center gap-3 px-3 py-2 text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200"
              href="#"
            >
              <span class="material-symbols-outlined" data-icon="settings"
                >settings</span
              >
              <span class="font-body-md text-body-md">Settings</span>
            </a>
            <a
              class="flex items-center gap-3 px-3 py-2 text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200"
              href="#"
            >
              <span class="material-symbols-outlined" data-icon="logout"
                >logout</span
              >
              <span class="font-body-md text-body-md">Logout</span>
            </a>
          </nav>
        </div>
      </aside>
      <!-- Main Canvas -->
      <main
        class="flex-1 md:ml-[280px] overflow-y-auto custom-scrollbar bg-background"
      >
        <!-- TopAppBar (Predicted Component Integration) -->
        <header
          class="flex items-center justify-between px-margin-desktop py-4 w-full sticky top-0 bg-surface/80 backdrop-blur-md z-10 border-b border-outline-variant"
        >
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-primary"
                >edit_note</span
              >
              <span
                class="font-headline-md text-headline-md font-bold text-primary"
                >Edit Note</span
              >
            </div>
          </div>
        </header>
        <!-- Content Editor Section -->
        <section class="px-margin-mobile md:px-margin-desktop py-12">
          <div class="note-editor-container">
            <!-- The Form -->
            <form class="space-y-10" id="noteEditForm">
              <!-- Title Input -->
              <div class="group">
                <label
                  class="block font-label-md text-label-md text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary"
                  for="noteTitle"
                  >Note Title</label
                >
                <input
                  class="w-full bg-transparent border-0 border-b-2 border-outline-variant focus:ring-0 focus:border-primary px-0 py-2 font-headline-lg text-headline-lg transition-all placeholder:text-surface-dim"
                  id="noteTitle"
                  name="noteTitle"
                  placeholder="Enter title here..."
                  required=""
                  type="text"
                  value="Q4 Project Roadmap &amp; Strategic Synthesis"
                />
              </div>
              <!-- Description/Content Input -->
              <div class="group">
                <label
                  class="block font-label-md text-label-md text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary"
                  for="noteDescription"
                  >Description</label
                >
                <div
                  class="relative bg-surface rounded-xl border border-outline-variant focus-within:border-primary transition-all p-1"
                >
                  <!-- Simple Toolbar -->
                  <div
                    class="flex items-center gap-1 p-2 mb-2 border-b border-outline-variant/30"
                  >
                    <button
                      class="material-symbols-outlined p-1.5 hover:bg-surface-container-low rounded text-on-surface-variant"
                      type="button"
                    >
                      format_bold
                    </button>
                    <button
                      class="material-symbols-outlined p-1.5 hover:bg-surface-container-low rounded text-on-surface-variant"
                      type="button"
                    >
                      format_italic
                    </button>
                    <button
                      class="material-symbols-outlined p-1.5 hover:bg-surface-container-low rounded text-on-surface-variant"
                      type="button"
                    >
                      format_list_bulleted
                    </button>
                    <div class="w-px h-4 bg-outline-variant mx-1"></div>
                    <button
                      class="material-symbols-outlined p-1.5 hover:bg-surface-container-low rounded text-on-surface-variant"
                      type="button"
                    >
                      link
                    </button>
                    <button
                      class="material-symbols-outlined p-1.5 hover:bg-surface-container-low rounded text-on-surface-variant"
                      type="button"
                    >
                      image
                    </button>
                  </div>
                  <textarea
                    class="w-full bg-transparent border-0 focus:ring-0 px-4 py-2 font-body-md text-body-md custom-scrollbar resize-none leading-relaxed"
                    id="noteDescription"
                    name="noteDescription"
                    placeholder="Start capturing your thoughts..."
                    rows="12"
                  >
Our primary objective for Q4 is the convergence of our legacy infrastructure with the new cloud-native synthesizer. 

Key Milestones:
1. Complete API documentation by mid-October.
2. Stress test the message broker in high-concurrency environments.
3. Deploy final beta to stakeholders for synthesis feedback.

The professional minimalism of the new interface should reduce cognitive friction during this transition phase.</textarea
                  >
                </div>
              </div>
              <!-- Footer Controls -->
              <div
                class="pt-8 flex flex-col md:flex-row items-center justify-between border-t border-outline-variant gap-4"
              >
                <div
                  class="text-on-surface-variant font-label-sm text-label-sm flex items-center gap-2"
                ></div>
                <div class="flex items-center gap-3 w-full md:w-auto">
                  <button
                    class="flex-1 md:flex-none px-8 py-3 rounded-lg border border-primary text-primary font-label-md text-label-md hover:bg-surface-container-low transition-all active:scale-95"
                    onclick="history.back()"
                    type="button"
                  >
                    Cancel
                  </button>
                  <button
                    class="flex-1 md:flex-none px-12 py-3 rounded-lg bg-primary-container text-on-primary font-label-md text-label-md hover:opacity-90 shadow-sm transition-all active:scale-95 flex items-center justify-center gap-2"
                    type="submit"
                  >
                    <span class="material-symbols-outlined text-[20px]"
                      >check</span
                    >
                    Ok
                  </button>
                </div>
              </div>
            </form>
          </div>
        </section>
        <!-- Bottom Spacer -->
        <div class="h-12"></div>
      </main>
      <!-- Floating Action Button (FAB) - Suppression Logic applied (not needed on edit screen) -->
    </div>
    <script>
      // Micro-interaction for the form
      document
        .getElementById("noteEditForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const btn = e.target.querySelector('button[type="submit"]');
          const originalText = btn.innerHTML;

          btn.innerHTML =
            '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
          btn.disabled = true;

          setTimeout(() => {
            btn.innerHTML =
              '<span class="material-symbols-outlined">done_all</span> Saved';
            btn.classList.add("bg-secondary");

            setTimeout(() => {
              btn.innerHTML = originalText;
              btn.disabled = false;
              btn.classList.remove("bg-secondary");
            }, 1500);
          }, 1000);
        });

      // Auto-expand textarea (simple version)
      const textarea = document.getElementById("noteDescription");
      textarea.addEventListener("input", function () {
        if (this.scrollHeight > 300) {
          this.style.height = "auto";
          this.style.height = this.scrollHeight + "px";
        }
      });

      // Handle ESC key to cancel
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (confirm("Discard changes and return to home?")) {
            history.back();
          }
        }
      });
    </script>
  </body>
</html>
